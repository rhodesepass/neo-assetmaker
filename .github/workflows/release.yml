name: Auto Release

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/CHANGELOG.md'
  workflow_dispatch:
    inputs:
      force_release:
        description: '强制发布（跳过版本变更检查）'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      version_changed: ${{ steps.check-change.outputs.changed }}
      tag_exists: ${{ steps.check-tag.outputs.exists }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get current version from CHANGELOG
        id: get-version
        run: |
          VERSION=$(grep -oP '### v\K[0-9]+\.[0-9]+\.[0-9]+' docs/CHANGELOG.md | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Check if version changed
        id: check-change
        run: |
          CURRENT_VERSION=$(grep -oP '### v\K[0-9]+\.[0-9]+\.[0-9]+' docs/CHANGELOG.md | head -1)

          # 获取最新的 tag 版本号（而不是上一次提交）
          # 参考: https://git-scm.com/docs/git-describe
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          LATEST_TAG_VERSION=${LATEST_TAG#v}  # 去掉 v 前缀

          echo "Current version in CHANGELOG: $CURRENT_VERSION"
          echo "Latest tag version: $LATEST_TAG_VERSION"

          if [ -n "$CURRENT_VERSION" ] && [ "$CURRENT_VERSION" != "$LATEST_TAG_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed: $LATEST_TAG_VERSION -> $CURRENT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version not changed (current: $CURRENT_VERSION, latest tag: $LATEST_TAG_VERSION)"
          fi

      - name: Check if tag exists
        id: check-tag
        run: |
          VERSION=$(grep -oP '### v\K[0-9]+\.[0-9]+\.[0-9]+' docs/CHANGELOG.md | head -1)
          if git ls-remote --tags origin | grep -q "refs/tags/v$VERSION"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION does not exist"
          fi

  build:
    needs: check-version
    if: |
      (needs.check-version.outputs.version_changed == 'true' && needs.check-version.outputs.tag_exists == 'false') ||
      (github.event_name == 'workflow_dispatch' && inputs.force_release)
    uses: ./.github/workflows/build-app.yml
    with:
      skip_flasher: false
      uv_sync_mode: "frozen"
      version_override: ${{ needs.check-version.outputs.version }}

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ArknightsPassMaker-Build
          path: dist

      - name: Extract changelog for current version
        id: changelog
        shell: bash
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          # 提取当前版本的更新日志（从 ### vX.X.X 到下一个 ### v）
          CHANGELOG=$(awk "/^### v${VERSION}/,/^### v[0-9]/" docs/CHANGELOG.md | head -n -1)

          # 如果是最后一个版本（没有下一个 ### v），提取到文件结尾
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG=$(awk "/^### v${VERSION}/,0" docs/CHANGELOG.md)
          fi

          echo "Extracted changelog for v${VERSION}:"
          echo "$CHANGELOG"

          # 使用 heredoc 输出多行内容
          {
            echo "CHANGELOG<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          files: |
            dist/*.exe
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
